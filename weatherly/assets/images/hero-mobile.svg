<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 480" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Vivid royal-blue sky -->
    <linearGradient id="sky" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%"   stop-color="#1230b0"/>
      <stop offset="35%"  stop-color="#1638c0"/>
      <stop offset="65%"  stop-color="#2050d0"/>
      <stop offset="100%" stop-color="#3a6ae0"/>
    </linearGradient>
    <!-- Zenith darkening at very top only -->
    <linearGradient id="vsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#04102a" stop-opacity="0.42"/>
      <stop offset="25%"  stop-color="#04102a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#04102a" stop-opacity="0"/>
    </linearGradient>
    <!-- Golden sun glow upper right -->
    <radialGradient id="sun" cx="79%" cy="26%" r="26%">
      <stop offset="0%"   stop-color="#ffe880" stop-opacity="0.60"/>
      <stop offset="28%"  stop-color="#ffaa40" stop-opacity="0.32"/>
      <stop offset="65%"  stop-color="#ff8830" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ff8830" stop-opacity="0"/>
    </radialGradient>
    <!-- Wider ambient warm glow -->
    <radialGradient id="sunWide" cx="74%" cy="32%" r="46%">
      <stop offset="0%"   stop-color="#ffc060" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffc060" stop-opacity="0"/>
    </radialGradient>
    <!-- Left overlay for text legibility -->
    <linearGradient id="lo" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%"   stop-color="#060e30" stop-opacity="0.28"/>
      <stop offset="38%"  stop-color="#060e30" stop-opacity="0.10"/>
      <stop offset="55%"  stop-color="#060e30" stop-opacity="0"/>
    </linearGradient>
    <!-- Horizon band: lighter blue glow just above buildings -->
    <linearGradient id="horiz" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4a90f8" stop-opacity="0"/>
      <stop offset="58%"  stop-color="#4a90f8" stop-opacity="0"/>
      <stop offset="68%"  stop-color="#5eb0ff" stop-opacity="0.25"/>
      <stop offset="76%"  stop-color="#5eb0ff" stop-opacity="0.12"/>
      <stop offset="85%"  stop-color="#4a90f8" stop-opacity="0"/>
    </linearGradient>
    <!-- Cloud blur filters -->
    <filter id="fc" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
    </filter>
    <filter id="fs" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7"/>
    </filter>
  </defs>

  <!-- ===== SKY ===== -->
  <rect width="430" height="480" fill="url(#sky)"/>
  <rect width="430" height="480" fill="url(#vsky)"/>
  <rect width="430" height="480" fill="url(#sunWide)"/>
  <rect width="430" height="480" fill="url(#sun)"/>
  <rect width="430" height="480" fill="url(#lo)"/>

  <!-- ===== CLOUDS (upper portion — sky zone) ===== -->
  <ellipse cx="335" cy="108" rx="115" ry="50" fill="white" fill-opacity="0.11" filter="url(#fc)"/>
  <ellipse cx="378" cy="128" rx="82"  ry="40" fill="white" fill-opacity="0.09" filter="url(#fc)"/>
  <ellipse cx="300" cy="132" rx="92"  ry="36" fill="white" fill-opacity="0.08" filter="url(#fc)"/>
  <ellipse cx="88"  cy="80"  rx="92"  ry="22" fill="white" fill-opacity="0.06" filter="url(#fc)"/>
  <ellipse cx="192" cy="64"  rx="72"  ry="18" fill="white" fill-opacity="0.05" filter="url(#fc)"/>
  <ellipse cx="148" cy="98"  rx="60"  ry="14" fill="white" fill-opacity="0.04" filter="url(#fs)"/>

  <!-- ===== HORIZON GLOW (bright band just above city) ===== -->
  <rect width="430" height="480" fill="url(#horiz)"/>

  <!-- ===== CITY SKYLINE — BACK LAYER (tall, prominent) ===== -->
  <!-- Buildings occupy y=100-480, filling the lower half of the sky -->
  <path fill="#05112e" fill-opacity="0.80" d="
    M 0,480
    L 0,298
    L 12,298 L 12,280 L 24,280 L 24,292 L 36,292 L 36,272 L 48,272
    L 48,285 L 56,285 L 56,268 L 66,268 L 66,282 L 74,282 L 74,260
    L 84,260 L 84,275 L 90,275 L 90,250 L 100,250 L 100,262
    L 106,262 L 106,252 L 113,252 L 113,235 L 123,235 L 123,248
    L 128,248 L 128,240 L 135,240 L 135,222 L 145,222 L 145,238
    L 150,238 L 150,230 L 157,230 L 157,210 L 167,210 L 167,225
    L 172,225 L 172,218 L 178,218 L 178,198 L 188,198 L 188,215
    L 193,215 L 193,228 L 200,228 L 200,215 L 206,215 L 206,230
    L 215,230 L 215,245 L 222,245 L 222,232 L 230,232 L 230,250
    L 242,250 L 242,262 L 254,262 L 254,252 L 266,252 L 266,265
    L 280,265 L 280,258 L 294,258 L 294,270 L 308,270 L 308,262
    L 322,262 L 322,272 L 338,272 L 338,265 L 352,265 L 352,278
    L 368,278 L 368,270 L 382,270 L 382,282 L 398,282 L 398,275
    L 414,275 L 414,288 L 430,288 L 430,480
    Z
  "/>

  <!-- ===== CITY SKYLINE — FRONT LAYER (shorter, darkest) ===== -->
  <path fill="#030c22" fill-opacity="0.90" d="
    M 0,480
    L 0,338
    L 18,338 L 18,322 L 32,322 L 32,335 L 46,335 L 46,320 L 60,320
    L 60,332 L 74,332 L 74,318 L 88,318 L 88,330 L 102,330 L 102,315
    L 116,315 L 116,328 L 130,328 L 130,338 L 146,338 L 146,325
    L 162,325 L 162,335 L 178,335 L 178,322 L 194,322 L 194,332
    L 210,332 L 210,342 L 228,342 L 228,330 L 246,330 L 246,342
    L 264,342 L 264,350 L 282,350 L 282,340 L 300,340 L 300,350
    L 318,350 L 318,342 L 336,342 L 336,352 L 354,352 L 354,344
    L 372,344 L 372,354 L 390,354 L 390,346 L 408,346 L 408,356
    L 430,356 L 430,480
    Z
  "/>
</svg>
